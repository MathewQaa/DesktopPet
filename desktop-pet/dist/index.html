<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop Pet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  #pet-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: transparent;
  }
  #pet {
    position: absolute;
    width: 128px;
    height: 128px;
    cursor: grab;
    transition: transform 0.1s;
    image-rendering: pixelated;
    z-index: 10;
  }
  #pet:active { cursor: grabbing; }
  #pet.dragging { filter: brightness(1.2); }
  #speech-bubble {
    position: absolute;
    background: rgba(255, 255, 255, 0.95);
    border: 2px solid #333;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #333;
    max-width: 200px;
    word-wrap: break-word;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid #333;
  }
  #speech-bubble.show { opacity: 1; }
  #status-bar {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    font-size: 10px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 15;
  }
  .status-item {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 2px 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  #context-menu {
    position: fixed;
    background: rgba(40, 40, 40, 0.95);
    border-radius: 8px;
    padding: 4px 0;
    min-width: 150px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    z-index: 1000;
    display: none;
    backdrop-filter: blur(10px);
  }
  .menu-item {
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .menu-item:hover { background: rgba(255,255,255,0.15); }
  .menu-item.danger { color: #ff6b6b; }
  .menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 4px 0; }
</style>
</head>
<body>
<div id="pet-container">
  <canvas id="pet" width="128" height="128"></canvas>
  <div id="speech-bubble"></div>
  <div id="status-bar">
    <span class="status-item">⚡ <span id="energy-val">100</span>%</span>
    <span class="status-item">💖 <span id="happiness-val">80</span>%</span>
  </div>
</div>
<div id="context-menu">
  <div class="menu-item" data-action="feed">🍖 喂食</div>
  <div class="menu-item" data-action="play">🎮 玩耍</div>
  <div class="menu-item" data-action="sleep">😴 睡觉</div>
  <div class="menu-divider"></div>
  <div class="menu-item" data-action="change-skin">🎨 换皮肤</div>
  <div class="menu-item" data-action="settings">⚙️ 设置</div>
  <div class="menu-divider"></div>
  <div class="menu-item danger" data-action="quit">👋 退出</div>
</div>
<script>
// ============ 桌宠核心引擎 ============
const canvas = document.getElementById('pet');
const ctx = canvas.getContext('2d');
const speechBubble = document.getElementById('speech-bubble');
const contextMenu = document.getElementById('context-menu');

// 宠物状态
const pet = {
  x: window.innerWidth - 150,
  y: window.innerHeight - 180,
  vx: 0,
  vy: 0,
  width: 128,
  height: 128,
  facingRight: true,
  isDragging: false,
  dragOffsetX: 0,
  dragOffsetY: 0,
  lastMouseX: 0,
  lastMouseY: 0,
  mouseVX: 0,
  mouseVY: 0,
  
  // 动画
  currentAction: 'idle',
  frameIndex: 0,
  frameTimer: 0,
  animSpeed: 150,
  
  // 属性
  energy: 100,
  happiness: 80,
  boredom: 0,
  
  // 行为
  behaviorTimer: 0,
  behaviorDuration: 3,
  
  // 对话
  speechTimer: 0,
  currentSpeech: '',
};

// 动画帧定义（使用程序化绘制）
const animations = {
  idle: { frames: 4, speed: 200, loop: true },
  walk: { frames: 4, speed: 120, loop: true },
  sleep: { frames: 2, speed: 400, loop: true },
  drag: { frames: 1, speed: 100, loop: false },
  jump: { frames: 3, speed: 150, loop: false },
  sit: { frames: 2, speed: 200, loop: true },
};

// ============ 程序化绘制猫咪 ============
function drawCat(frame, action, facingRight) {
  ctx.clearRect(0, 0, 128, 128);
  
  ctx.save();
  if (!facingRight) {
    ctx.translate(128, 0);
    ctx.scale(-1, 1);
  }
  
  const bounce = action === 'walk' ? Math.sin(frame * Math.PI / 2) * 3 : 0;
  const breathe = action === 'idle' ? Math.sin(frame * Math.PI / 2) * 1 : 0;
  const sleepBreath = action === 'sleep' ? Math.sin(frame * Math.PI) * 2 : 0;
  
  ctx.save();
  ctx.translate(64, 64 + bounce);
  
  if (action === 'sleep') {
    ctx.rotate(-0.2);
    ctx.translate(10, 5 + sleepBreath);
  }
  if (action === 'sit') {
    ctx.translate(0, 8);
  }
  if (action === 'drag') {
    ctx.rotate(Math.sin(frame) * 0.1);
  }
  
  // 身体
  ctx.fillStyle = '#FF9F43';
  ctx.beginPath();
  ctx.ellipse(0, 10 + breathe, 28, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#E17055';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // 肚子
  ctx.fillStyle = '#FFEAA7';
  ctx.beginPath();
  ctx.ellipse(0, 15 + breathe, 18, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // 头
  ctx.fillStyle = '#FF9F43';
  ctx.beginPath();
  ctx.ellipse(0, -18 + breathe, 24, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#E17055';
  ctx.stroke();
  
  // 耳朵
  ctx.fillStyle = '#FF9F43';
  ctx.beginPath();
  ctx.moveTo(-18, -30 + breathe);
  ctx.lineTo(-10, -48 + breathe);
  ctx.lineTo(-2, -30 + breathe);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(18, -30 + breathe);
  ctx.lineTo(10, -48 + breathe);
  ctx.lineTo(2, -30 + breathe);
  ctx.fill();
  ctx.stroke();
  
  // 耳朵内部
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.moveTo(-14, -32 + breathe);
  ctx.lineTo(-10, -43 + breathe);
  ctx.lineTo(-6, -32 + breathe);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, -32 + breathe);
  ctx.lineTo(10, -43 + breathe);
  ctx.lineTo(6, -32 + breathe);
  ctx.fill();
  
  // 眼睛
  if (action === 'sleep') {
    // 闭眼
    ctx.strokeStyle = '#2D3436';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-12, -20 + breathe);
    ctx.lineTo(-4, -18 + breathe);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(12, -20 + breathe);
    ctx.lineTo(4, -18 + breathe);
    ctx.stroke();
  } else if (action === 'drag') {
    // 大眼睛（被拖拽时）
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-8, -20 + breathe, 7, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8, -20 + breathe, 7, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2D3436';
    ctx.beginPath();
    ctx.arc(-7, -19 + breathe, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(9, -19 + breathe, 4, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-5, -21 + breathe, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(11, -21 + breathe, 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // 正常眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-8, -20 + breathe, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8, -20 + breathe, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2D3436';
    ctx.beginPath();
    ctx.arc(-7, -19 + breathe, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(9, -19 + breathe, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-5, -21 + breathe, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(11, -21 + breathe, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // 鼻子
  ctx.fillStyle = '#E17055';
  ctx.beginPath();
  ctx.moveTo(0, -12 + breathe);
  ctx.lineTo(-3, -9 + breathe);
  ctx.lineTo(3, -9 + breathe);
  ctx.fill();
  
  // 嘴巴
  ctx.strokeStyle = '#2D3436';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -9 + breathe);
  ctx.lineTo(0, -6 + breathe);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(-4, -5 + breathe, 4, 0, Math.PI, false);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(4, -5 + breathe, 4, 0, Math.PI, false);
  ctx.stroke();
  
  // 胡须
  ctx.strokeStyle = '#2D3436';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-14, -10 + i * 4 + breathe);
    ctx.lineTo(-30, -12 + i * 5 + breathe);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(14, -10 + i * 4 + breathe);
    ctx.lineTo(30, -12 + i * 5 + breathe);
    ctx.stroke();
  }
  
  // 尾巴
  const tailWag = action === 'idle' ? Math.sin(Date.now() / 300) * 15 : 
                  action === 'walk' ? Math.sin(Date.now() / 150) * 20 : 0;
  ctx.strokeStyle = '#FF9F43';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(20, 15);
  ctx.quadraticCurveTo(40, 10 + tailWag, 45, -10 + tailWag * 0.5);
  ctx.stroke();
  ctx.strokeStyle = '#E17055';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(20, 15);
  ctx.quadraticCurveTo(40, 10 + tailWag, 45, -10 + tailWag * 0.5);
  ctx.stroke();
  
  // 脚
  const footOffset = action === 'walk' ? Math.sin(frame * Math.PI / 2) * 4 : 0;
  ctx.fillStyle = '#FF9F43';
  // 前脚
  ctx.beginPath();
  ctx.ellipse(-12, 30 + footOffset, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#E17055';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(12, 30 - footOffset, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // 后脚
  ctx.fillStyle = '#FF9F43';
  ctx.beginPath();
  ctx.ellipse(-20, 28, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(5, 28, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  // 肉垫
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.ellipse(-12, 32 + footOffset, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(12, 32 - footOffset, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
  ctx.restore();
}

// ============ 物理系统 ============
function updatePhysics(dt) {
  if (pet.isDragging) return;
  
  // 重力
  if (pet.y < window.innerHeight - pet.height - 30) {
    pet.vy += 0.5;
  } else {
    pet.y = window.innerHeight - pet.height - 30;
    pet.vy = 0;
  }
  
  // 摩擦力
  pet.vx *= 0.92;
  
  // 更新位置
  pet.x += pet.vx * dt;
  pet.y += pet.vy * dt;
  
  // 边界
  if (pet.x < 0) { pet.x = 0; pet.vx = Math.abs(pet.vx) * 0.5; pet.facingRight = true; }
  if (pet.x > window.innerWidth - pet.width) { pet.x = window.innerWidth - pet.width; pet.vx = -Math.abs(pet.vx) * 0.5; pet.facingRight = false; }
  if (pet.y < 0) { pet.y = 0; pet.vy = Math.abs(pet.vy) * 0.3; }
  if (pet.y > window.innerHeight - pet.height - 30) { pet.y = window.innerHeight - pet.height - 30; pet.vy = 0; }
  
  // 朝向
  if (pet.vx > 0.5) pet.facingRight = true;
  if (pet.vx < -0.5) pet.facingRight = false;
}

// ============ 行为 AI ============
function updateBehavior(dt) {
  if (pet.isDragging) return;
  
  pet.behaviorTimer += dt;
  
  // 能量消耗
  if (pet.currentAction === 'walk') {
    pet.energy = Math.max(0, pet.energy - dt * 0.3);
  } else if (pet.currentAction === 'sleep') {
    pet.energy = Math.min(100, pet.energy + dt * 1.5);
  } else {
    pet.energy = Math.max(0, pet.energy - dt * 0.05);
  }
  
  // 无聊度
  pet.boredom = Math.min(100, pet.boredom + dt * 0.2);
  
  // 心情
  if (pet.behaviorTimer > 60) {
    pet.happiness = Math.max(0, pet.happiness - dt * 0.3);
  }
  
  // 切换行为
  if (pet.behaviorTimer >= pet.behaviorDuration) {
    pet.behaviorTimer = 0;
    pet.behaviorDuration = 2 + Math.random() * 4;
    
    const rand = Math.random();
    
    if (pet.energy < 15) {
      setAction('sleep');
      pet.behaviorDuration = 5 + Math.random() * 10;
    } else if (rand < 0.3) {
      setAction('idle');
    } else if (rand < 0.5) {
      setAction('walk');
      pet.vx = (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random() * 2);
      pet.facingRight = pet.vx > 0;
    } else if (rand < 0.65) {
      setAction('sit');
    } else if (rand < 0.8 && pet.y >= window.innerHeight - pet.height - 35) {
      setAction('jump');
      pet.vy = -10;
    } else {
      setAction('idle');
    }
  }
  
  // 更新状态栏
  document.getElementById('energy-val').textContent = Math.round(pet.energy);
  document.getElementById('happiness-val').textContent = Math.round(pet.happiness);
}

function setAction(action) {
  if (pet.currentAction !== action) {
    pet.currentAction = action;
    pet.frameIndex = 0;
    pet.frameTimer = 0;
    pet.animSpeed = animations[action]?.speed || 150;
  }
}

// ============ 对话系统 ============
const dialogs = {
  happy: ['喵~ 今天也要加油哦！', '摸摸头~ (蹭蹭)', '♪ 感觉心情超好！', '陪我玩嘛~', '咕噜咕噜~'],
  hungry: ['肚子好饿... (可怜)', '有吃的吗？', '...闻到鱼的味道了！', '喵... (肚子咕咕叫)', '铲屎官！快上粮！'],
  tired: ['想睡觉了 Zzz...', '好困啊...', '(打哈欠) 呼~', '让我眯一会儿...'],
  sad: ['...不理我了吗', '要摸摸才会好起来', '(哭泣) 呜...'],
  click: ['喵？', '(歪头看你)', '有什么事吗？', '~ 🐾', '不要戳我啦~', '(蹭蹭你的手)'],
  drag: ['喵！放我下来！', '好高好高！', '(害怕) 呜...', '我要掉下去了！', '救命喵！'],
  feed: ['好吃！谢谢！', '喵~ (满足)', '还要还要！', '(舔嘴巴) 真香~'],
  play: ['好开心！', '再来再来！', '♪ ♪ ♪', '(翻滚)'],
};

function say(text, duration = 3000) {
  pet.currentSpeech = text;
  pet.speechTimer = duration;
  speechBubble.textContent = text;
  speechBubble.classList.add('show');
}

function getRandomDialog(category) {
  const arr = dialogs[category] || dialogs.click;
  return arr[Math.floor(Math.random() * arr.length)];
}

// ============ 鼠标交互 ============
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    pet.isDragging = true;
    pet.dragOffsetX = e.clientX - pet.x;
    pet.dragOffsetY = e.clientY - pet.y;
    pet.lastMouseX = e.clientX;
    pet.lastMouseY = e.clientY;
    pet.mouseVX = 0;
    pet.mouseVY = 0;
    setAction('drag');
    canvas.classList.add('dragging');
    say(getRandomDialog('drag'), 2000);
  }
});

document.addEventListener('mousemove', (e) => {
  if (pet.isDragging) {
    pet.mouseVX = e.clientX - pet.lastMouseX;
    pet.mouseVY = e.clientY - pet.lastMouseY;
    pet.x = e.clientX - pet.dragOffsetX;
    pet.y = e.clientY - pet.dragOffsetY;
    pet.lastMouseX = e.clientX;
    pet.lastMouseY = e.clientY;
  }
});

document.addEventListener('mouseup', () => {
  if (pet.isDragging) {
    pet.isDragging = false;
    pet.vx = pet.mouseVX * 0.3;
    pet.vy = pet.mouseVY * 0.3;
    canvas.classList.remove('dragging');
    setAction('idle');
  }
});

canvas.addEventListener('click', (e) => {
  if (Math.abs(pet.vx) < 0.5 && Math.abs(pet.vy) < 0.5) {
    say(getRandomDialog('click'), 2500);
    pet.happiness = Math.min(100, pet.happiness + 5);
    pet.boredom = Math.max(0, pet.boredom - 10);
  }
});

canvas.addEventListener('dblclick', (e) => {
  if (pet.y >= window.innerHeight - pet.height - 35) {
    setAction('jump');
    pet.vy = -12;
    say('喵！', 1500);
  }
});

// 右键菜单
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  contextMenu.style.left = e.clientX + 'px';
  contextMenu.style.top = e.clientY + 'px';
  contextMenu.style.display = 'block';
});

document.addEventListener('click', (e) => {
  if (!contextMenu.contains(e.target)) {
    contextMenu.style.display = 'none';
  }
});

contextMenu.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', () => {
    const action = item.dataset.action;
    contextMenu.style.display = 'none';
    
    switch (action) {
      case 'feed':
        pet.energy = Math.min(100, pet.energy + 20);
        pet.happiness = Math.min(100, pet.happiness + 10);
        say(getRandomDialog('feed'), 2500);
        break;
      case 'play':
        pet.happiness = Math.min(100, pet.happiness + 15);
        pet.boredom = Math.max(0, pet.boredom - 30);
        pet.energy = Math.max(0, pet.energy - 10);
        setAction('jump');
        pet.vy = -10;
        say(getRandomDialog('play'), 2500);
        break;
      case 'sleep':
        setAction('sleep');
        pet.behaviorTimer = 0;
        pet.behaviorDuration = 8;
        say('Zzz...', 3000);
        break;
      case 'change-say':
        say('皮肤商店即将上线！', 2000);
        break;
      case 'settings':
        say('设置面板开发中~', 2000);
        break;
      case 'quit':
        window.close();
        break;
    }
  });
});

// ============ 主循环 ============
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  
  // 更新物理
  updatePhysics(dt);
  
  // 更新行为
  updateBehavior(dt);
  
  // 更新动画
  pet.frameTimer += dt * 1000;
  const anim = animations[pet.currentAction];
  if (anim && pet.frameTimer >= pet.animSpeed) {
    pet.frameTimer = 0;
    pet.frameIndex++;
    if (pet.frameIndex >= anim.frames) {
      pet.frameIndex = anim.loop ? 0 : anim.frames - 1;
    }
  }
  
  // 更新对话计时
  if (pet.speechTimer > 0) {
    pet.speechTimer -= dt * 1000;
    if (pet.speechTimer <= 0) {
      speechBubble.classList.remove('show');
    }
  }
  
  // 绘制
  drawCat(pet.frameIndex, pet.currentAction, pet.facingRight);
  
  // 更新位置
  canvas.style.left = pet.x + 'px';
  canvas.style.top = pet.y + 'px';
  
  // 对话气泡位置
  speechBubble.style.left = (pet.x + 64 - 100) + 'px';
  speechBubble.style.top = (pet.y - 50) + 'px';
  
  // 状态栏位置
  document.getElementById('status-bar').style.left = (pet.x + 64) + 'px';
  document.getElementById('status-bar').style.top = (pet.y + pet.height + 5) + 'px';
  
  requestAnimationFrame(gameLoop);
}

// 启动
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
